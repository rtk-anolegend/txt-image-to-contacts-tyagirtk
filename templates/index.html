<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TXT to VCF Contact Extractor</title>

  <!-- Google Font (Professional SaaS look) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome CDN (Icons) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="/static/style.css">

  <!-- SEO / Professional meta -->
  <meta name="description" content="Mobile-friendly web tool to extract phone numbers from TXT files and export them as VCF contacts">
</head>
<body>

  <main class="app-container">
    <section class="card" id="extractor-card">

      <!-- Header -->
      <header class="card-header">
        <div class="icon-wrapper">
          <i class="fa-solid fa-address-book"></i>
        </div>

        <h1 class="app-title">TXT to VCF</h1>
        <p class="app-subtitle">
          Extract phone numbers from text files and convert them into
          import-ready contacts.
        </p>
      </header>

      <!-- Upload Form -->
      <form 
        class="upload-form"
        id="uploadForm"
        method="POST"
        enctype="multipart/form-data"
      >
        <label for="txtfile" class="file-label">
          <i class="fa-solid fa-file-lines"></i>
          Select TXT File
        </label>

        <input
          type="file"
          id="txtfile"
          name="txtfile"
          class="file-input"
          accept=".txt"
          required
        />

        <button type="submit" class="submit-btn">
          <i class="fa-solid fa-bolt"></i>
          Generate VCF
        </button>
      </form>

      <!-- Hint -->
      <p class="hint-text">
        <i class="fa-solid fa-circle-info"></i>
        The generated VCF file can be directly imported into your phone contacts.
      </p>

      <!-- Footer / Branding -->
      <footer class="card-footer">
        <span>
          <i class="fa-solid fa-code"></i>
          Developed by <strong>RTK</strong>
        </span>
        <span class="dot">•</span>
        <a
          href="https://instagram.com/tyagirtk"
          target="_blank"
          rel="noopener"
        >
          <i class="fa-brands fa-instagram"></i>
          @tyagirtk
        </a>
      </footer>

    </section>
  </main>

</body>
</html>
