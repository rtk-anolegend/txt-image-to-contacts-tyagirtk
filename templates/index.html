<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Extractor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<main class="app-container">
  <section class="card">

    <!-- Header -->
    <header class="card-header">
      <h1 class="app-title">Contact Extractor</h1>
      <p class="app-subtitle">
        Upload TXT or Image and export contacts instantly
      </p>
    </header>

    <!-- FORM -->
    <form method="POST" enctype="multipart/form-data" class="upload-form">

      <!-- FILE INPUT -->
      <label class="file-label">
        Select TXT / Image File
      </label>

      <input 
        type="file" 
        name="file" 
        accept=".txt,.png,.jpg,.jpeg" 
        required 
        class="file-input"
      />

      <!-- EXPORT TYPE -->
      <label class="file-label">Export Format</label>

      <select name="export" class="file-input">
        <option value="vcf">VCF (Contacts)</option>
        <option value="csv">CSV (Excel)</option>
        <option value="excel">Excel (.xls)</option>
      </select>

      <!-- BUTTON -->
      <button type="submit" class="submit-btn">
        Extract Contacts
      </button>

    </form>

    <!-- INFO -->
    <p class="hint-text">
      Upload TXT file or screenshot image. Contacts will be extracted and ready to import.
    </p>

    <!-- FOOTER -->
    <footer class="card-footer">
      <span>Developed by <strong>RTK</strong></span>
    </footer>

  </section>
</main>

</body>
</html>
